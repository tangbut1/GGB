app:
  title: "MarketPulse BettaFish 架构版"
  theme: "dark"

data:
  raw_path: "data/raw/raw_news.json"
  processed_dir: "data/processed"
  results_dir: "results"
  knowledge_db_path: "data/knowledge/events.sqlite3"

agent_llm:
  collect_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_COLLECT_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
    timeout: 90
    temperature: 0.7
    max_retries: 1
  sentiment_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_SENTIMENT_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
    timeout: 60
    temperature: 0.3
    max_retries: 1
  trend_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_TREND_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
    timeout: 60
    temperature: 0.7
    max_retries: 1
  report_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_REPORT_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
    timeout: 120
    temperature: 0.1
    max_retries: 2
  forum_host:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_FORUM_HOST_API_KEY}"
    model: "deepseek-v4-flash"
    timeout: 60
    temperature: 0.7
    max_retries: 1
    trigger_threshold: 5
    wait_timeout: 15

analysis:
  use_prophet: true
  forecast_periods: 30

report:
  enable_pdf: true
  enable_docx: true
  enable_html: true

collect:
  retries: 3
  timeout: 15
  cache_ttl: 0
  host_research_max_results: 60
  max_results:
    social: 500
    news: 300
  min_results:
    social: 300
    news: 200
  time_distribution:
    recent_7d: 0.30
    week_8_30d: 0.40
    month_31_90d: 0.30
