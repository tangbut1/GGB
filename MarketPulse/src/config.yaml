app:
  title: "MarketPulse BettaFish 架构版"
  theme: "dark"

data:
  raw_path: "data/raw/raw_news.json"
  processed_dir: "data/processed"
  results_dir: "results"

agent_llm:
  collect_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_COLLECT_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
  sentiment_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_SENTIMENT_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
  trend_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_TREND_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
  report_agent:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_REPORT_AGENT_API_KEY}"
    model: "deepseek-v4-flash"
  forum_host:
    base_url: "https://api.deepseek.com/v1"
    api_key: "${MP_FORUM_HOST_API_KEY}"
    model: "deepseek-v4-flash"
    trigger_threshold: 5

analysis:
  use_prophet: true
  forecast_periods: 30

report:
  enable_pdf: true
  enable_docx: true
  enable_html: true

collect:
  retries: 3
  timeout: 15
  max_results:
    social: 500
    news: 300
  min_results:
    social: 300
    news: 200
  time_distribution:
    recent_7d: 0.30
    week_8_30d: 0.40
    month_31_90d: 0.30
